<div class="container mt-4">

  <div class="card shadow">

    <div class="card-header">
      <h3>{{ id ? 'Edit User' : 'Add User' }}</h3>
    </div>

    <div class="card-body">

      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="row">

          <!-- Name -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" formControlName="name">

            <small class="text-danger"
              *ngIf="form.get('name')?.touched && form.get('name')?.hasError('required')">
              Name is required
            </small>
          </div>

          <!-- Email -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" formControlName="email">

            <small class="text-danger"
              *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
              Email is required
            </small>

            <small class="text-danger"
              *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
              Invalid email format
            </small>
          </div>

          <!-- Phone -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" formControlName="phone">
          </div>

          <!-- Department -->
          <div class="col-md-6 mb-3">
            <label class="form-label">Department</label>

            <select class="form-select" formControlName="department">
              <option value="">Select Department</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
            </select>
          </div>

          <!-- Gender -->
          <div class="col-md-6 mb-3">
            <label class="form-label d-block">Gender</label>

            <div class="form-check form-check-inline">
              <input class="form-check-input"
                     type="radio"
                     formControlName="gender"
                     value="Male">
              <label class="form-check-label">Male</label>
            </div>

            <div class="form-check form-check-inline">
              <input class="form-check-input"
                     type="radio"
                     formControlName="gender"
                     value="Female">
              <label class="form-check-label">Female</label>
            </div>
          </div>

          <!-- Skills -->
          <div class="col-md-6 mb-3">
            <label class="form-label d-block">Skills</label>

            <div class="form-check">
              <input type="checkbox"
                     class="form-check-input"
                     value="Angular"
                     (change)="toggleSkill('Angular', $event)"
                     [checked]="form.value.skills?.includes('Angular')">
              <label class="form-check-label">Angular</label>
            </div>

            <div class="form-check">
              <input type="checkbox"
                     class="form-check-input"
                     value="React"
                     (change)="toggleSkill('React', $event)"
                     [checked]="form.value.skills?.includes('React')">
              <label class="form-check-label">React</label>
            </div>

            <div class="form-check">
              <input type="checkbox"
                     class="form-check-input"
                     value="NodeJS"
                     (change)="toggleSkill('NodeJS', $event)"
                     [checked]="form.value.skills?.includes('NodeJS')">
              <label class="form-check-label">NodeJS</label>
            </div>
          </div>

          <!-- Address -->
          <div class="col-md-12 mb-3">
            <label class="form-label">Address</label>
            <textarea rows="3"
                      class="form-control"
                      formControlName="address">
            </textarea>
          </div>

          <!-- Status -->
          <div class="col-md-6 mb-3">
            <label class="form-label d-block">Status</label>

            <div class="form-check">
              <input class="form-check-input"
                     type="checkbox"
                     formControlName="status">
              <label class="form-check-label">Active</label>
            </div>
          </div>

        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary">
          {{ id ? 'Update User' : 'Save User' }}
        </button>

        <button type="button"
                class="btn btn-secondary ms-2"
                routerLink="/users">
          Cancel
        </button>

      </form>

    </div>
  </div>
</div>
